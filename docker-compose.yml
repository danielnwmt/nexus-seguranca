# Nexus Monitoramento - Docker Compose
# Uso: docker-compose up -d
# Documentação completa: INSTALL.md

version: '3.8'

services:
  # PostgreSQL + PostgREST
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NexusDb2024}
      POSTGRES_DB: nexus_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./installer/init-database.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-NexusDb2024}@postgres:5432/nexus_db
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  # Servidor de autenticação Node.js
  auth-server:
    build:
      context: .
      dockerfile: Dockerfile.auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-NexusDb2024}@postgres:5432/nexus_db
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-me}
      POSTGREST_URL: http://postgrest:3000
    depends_on:
      postgres:
        condition: service_healthy

  # Servidor de mídia MediaMTX
  mediamtx:
    image: bluenviron/mediamtx:1.9.3
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "8189:8189/udp" # WebRTC ICE
    volumes:
      - ./installer/mediamtx.yml:/mediamtx.yml
    network_mode: host

  # Frontend Nginx
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - auth-server
      - postgrest

volumes:
  pgdata:
